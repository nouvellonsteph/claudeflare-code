name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Generate types
        run: npx wrangler types

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck UI
        run: npm run typecheck:ui

      - name: Build UI
        run: npm run build:ui

      - name: Test
        run: npm run test

  preview:
    if: github.event_name == 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build UI
        run: npm run build:ui

      - name: Deploy preview
        id: preview
        run: |
          OUTPUT=$(npx wrangler preview --json --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}")
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | jq -r '.preview_url // .url // empty')
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: steps.preview.outputs.preview_url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.preview_url }}';
            const body = `### Preview Deployment\n\n| Status | URL |\n|--------|-----|\n| ✅ Ready | [${url}](${url}) |\n\nBuilt from commit ${{ github.sha }}`;

            // Find existing preview comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('### Preview Deployment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
